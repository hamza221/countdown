<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add Flight</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --input-bg: #f9f9f9;
      --input-border: #d0d0d0;
      --btn-bg: #000000;
      --btn-text: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --text-color: #ffffff;
        --input-bg: #222222;
        --input-border: #444444;
        --btn-bg: #ffffff;
        --btn-text: #000000;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text-color);
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.8;
    }

    #result {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
      word-break: break-all;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    @media (prefers-color-scheme: dark) {
      a { color: #66b3ff; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Create Flight Link</h1>

    <div class="form-group">
      <label for="adminToken">Admin Token</label>
      <input type="password" id="adminToken" placeholder="Secret Token">
    </div>

    <div class="form-group">
      <label for="flightIata">Flight IATA (e.g. W62372)</label>
      <input type="text" id="flightIata" placeholder="W62372">
    </div>

    <div class="form-group">
      <label for="flightDate">Flight Date (YYYY-MM-DD)</label>
      <input type="text" id="flightDate" placeholder="2026-04-20">
    </div>

    <div class="form-group">
      <label for="depCode">Departure Code (e.g. MAD)</label>
      <input type="text" id="depCode" placeholder="MAD">
    </div>

    <div class="form-group">
      <label for="depCity">Departure City</label>
      <input type="text" id="depCity" placeholder="Madrid">
    </div>

    <div class="form-group">
      <label for="arrCode">Arrival Code (e.g. BUD)</label>
      <input type="text" id="arrCode" placeholder="BUD">
    </div>

    <div class="form-group">
      <label for="arrCity">Arrival City</label>
      <input type="text" id="arrCity" placeholder="Budapest">
    </div>

    <div class="form-group">
      <label for="message">Arrival Message</label>
      <input type="text" id="message" placeholder="Budaaaa!">
    </div>

    <button onclick="saveFlight()">Generate Link</button>

    <div id="result"></div>
  </div>

  <script>
    async function saveFlight() {
      const btn = document.querySelector('button');
      btn.textContent = 'Saving...';
      btn.disabled = true;

      const payload = {
        flight_iata: document.getElementById('flightIata').value,
        flight_date: document.getElementById('flightDate').value,
        dep_code: document.getElementById('depCode').value,
        dep_city: document.getElementById('depCity').value,
        arr_code: document.getElementById('arrCode').value,
        arr_city: document.getElementById('arrCity').value,
        arrival_message: document.getElementById('message').value
      };

      const token = document.getElementById('adminToken').value;

      try {
        const response = await fetch('https://flight-proxy.hamzamahjoubi221.workers.dev/api/flights', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          const url = `${window.location.origin}/index.html?id=${data.id}`;
          document.getElementById('result').innerHTML = `Success! Link:<br><br><a href="${url}" target="_blank">${url}</a>`;
        } else {
          document.getElementById('result').textContent = `Error: ${data.error || 'Unauthorized'}`;
        }
      } catch (err) {
        document.getElementById('result').textContent = 'Network error.';
      }

      btn.textContent = 'Generate Link';
      btn.disabled = false;
    }
  </script>
</body>
</html>
